<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>近七天天气像素画</title>
  <style>
    :root {
      --bg-a: #070b19;
      --bg-b: #121a31;
      --card: #111a2d;
      --card-line: #2d3d66;
      --text: #e7efff;
      --muted: #9bb0d9;
      --sun-core: #ffd857;
      --sun-ring: #ff9f43;
      --sun-glow: #ffba08;
      --cloud-hi: #d7e3ff;
      --cloud-mid: #9db3db;
      --cloud-low: #7086b1;
      --rain-a: #7ed0ff;
      --rain-b: #4190ff;
      --rain-glow: #a8d8ff;
      --storm: #caa7ff;
      --storm-glow: #e0c3ff;
      --snow: #bff5ff;
      --snow-glow: #e6fdff;
      --moon-a: #a4b7ff;
      --moon-b: #6f86f6;
      --moon-glow: #c0cfff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 450px at 8% -10%, #2f4f9f33 0%, transparent 55%),
        radial-gradient(800px 400px at 92% 110%, #0ea5e922 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-b), var(--bg-a));
      padding: 30px 18px 120px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(24px, 3.8vw, 38px);
      letter-spacing: 1px;
    }

    .sub {
      margin: 10px 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .board {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
    }

    .day-card {
      background: linear-gradient(180deg, #18233d, var(--card));
      border: 1px solid var(--card-line);
      border-radius: 14px;
      padding: 12px 8px 10px;
      text-align: center;
      box-shadow: 0 8px 20px #0000004f;
      transition: none;
    }

    .day-card:hover {
      box-shadow: 0 14px 26px #00000066;
      transform: none;
    }

    .weekday {
      font-size: 14px;
      font-weight: 700;
      color: #f0f6ff;
      margin-bottom: 8px;
    }

    .icon-wrap {
      height: 130px;
      display: grid;
      place-items: center;
      margin-bottom: 8px;
      cursor: pointer;
      transition: none;
      /* 开启3D变换 */
      perspective: 1000px;
    }

    .pixel {
      --size: 5px;
      display: grid;
      grid-template-columns: repeat(20, var(--size));
      grid-template-rows: repeat(20, var(--size));
      width: calc(20 * var(--size));
      height: calc(20 * var(--size));
      image-rendering: pixelated;
      transform-origin: 50% 50%;
      transition: transform 0.15s ease-out, filter 0.2s ease;
      /* 3D变换基础 */
      transform-style: preserve-3d;
    }

    .px { 
      width: var(--size); 
      height: var(--size); 
      transition: background-color 0.2s ease;
    }

    .pixel-shell {
      position: relative;
      width: calc(20 * var(--size));
      height: calc(20 * var(--size));
      transition: none;
    }

    /* 雨滴层样式 */
    .rain-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .rain-drop {
      position: absolute;
      top: -8%;
      left: calc(var(--x) * 1%);
      width: calc(var(--size) * 1);
      height: calc(var(--size) * 3);
      background: linear-gradient(180deg, var(--rain-glow), var(--rain-a), var(--rain-b));
      border-radius: 0 0 2px 2px;
      opacity: 0.8;
      image-rendering: pixelated;
      animation: terraria-rain var(--dur, .55s) steps(3, end) infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes terraria-rain {
      0% { transform: translateY(-10px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.8; }
      100% { transform: translateY(110px); opacity: 0; }
    }

    /* 雷阵雨闪烁效果 */
    .storm-icon .pixel [style*="var(--storm)"] {
      animation: storm-flash 1.2s infinite alternate;
    }

    @keyframes storm-flash {
      0% { opacity: 0.7; background-color: var(--storm); }
      100% { opacity: 1; background-color: var(--storm-glow); filter: drop-shadow(0 0 1px var(--storm-glow)); }
    }

    /* 雪花浮动效果 */
    .snow-icon .pixel [style*="var(--snow)"] {
      animation: snow-float 2s infinite alternate;
    }

    @keyframes snow-float {
      0% { transform: translateY(0px); background-color: var(--snow); }
      100% { transform: translateY(-2px); background-color: var(--snow-glow); }
    }

    /* 云朵动态变化动画 */
    @keyframes cloud-shift {
      0% { transform: translateX(0px); }
      50% { transform: translateX(2px); }
      100% { transform: translateX(-1px); }
    }

    .cloud-icon .pixel {
      animation: cloud-shift 3s ease-in-out infinite alternate;
    }

    .temp {
      font-size: 13px;
      color: #b7c7e5;
      margin-bottom: 4px;
    }

    .desc {
      font-size: 13px;
      font-weight: 700;
      color: #dfe8ff;
    }

    .signature {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #7dd3fc, #60a5fa, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 8px 28px #4cc9ff55;
      user-select: none;
      pointer-events: none;
      line-height: 1;
    }
  </style>
</head>
<body>
  <h1>近七天天气像素画</h1>
  <div class="sub">鼠标滑动图标可见压动效果</div>

  <section class="board" id="board"></section>

  <div class="signature">管俊超</div>

  <script>
    const C = {
      H: '#f4f8ff',
      C: 'var(--cloud-hi)',
      G: 'var(--cloud-mid)',
      D: 'var(--cloud-low)',
      Y: 'var(--sun-core)',
      O: 'var(--sun-ring)',
      Z: 'var(--sun-glow)',
      R: 'var(--rain-a)',
      B: 'var(--rain-b)',
      L: 'var(--storm)',
      S: 'var(--storm-glow)',
      W: 'var(--snow)',
      X: 'var(--snow-glow)',
      M: 'var(--moon-a)',
      N: 'var(--moon-b)',
      P: 'var(--moon-glow)'
    };

    // 优化后的像素图案 - 圆形太阳 + 更自然的云朵
    const icons = {
      // 圆形太阳像素画
      sunny: [
        '00000000000000000000','00000000ZZZ000000000','0000000ZZZZZ00000000','000000OYYYYYO0000000',
        '00000OYYYYYYYO000000','0000OYYYYYYYYYO00000','000OYYYYYYYYYYO00000','000OYYYYYYYYYYO00000',
        '00OYYYYYYYYYYYYO0000','00OYYYYYYYYYYYYO0000','00OYYYYYYYYYYYYO0000','000OYYYYYYYYYYO00000',
        '000OYYYYYYYYYYO00000','0000OYYYYYYYYYO00000','00000OYYYYYYYO000000','000000OYYYYYO0000000',
        '0000000ZZZZZ00000000','00000000ZZZ000000000','00000000000000000000','00000000000000000000'
      ],
      // 动态云朵（基础版）
      cloudy: [
        '00000000000000000000','00000000000000000000','000000000CC000000000','00000000CCCCC0000000',
        '0000000CCGGGCC000000','000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00',
        '000CCGGGGGGGGGGGGCC0','000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000',
        '000000CCGGGGGGCC0000','0000000CCGGGCC000000','00000000CCCCC0000000','000000000CCC00000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ],
      rain: [
        '00000000000000000000','000000000CC000000000','00000000CCCCC0000000','0000000CCGGGCC000000',
        '000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00','000CCGGGGGGGGGGGGCC0',
        '000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000','000000CCGGGGGGCC0000',
        '000000R00B00R0000000','0000000R0B0R00000000','000000R00B00R0000000','0000000R0B0R00000000',
        '000000R00B00R0000000','0000000R00B00R000000','00000000000000000000','00000000000000000000'
      ],
      storm: [
        '00000000000000000000','000000000CC000000000','00000000CCCCC0000000','0000000CCGGGCC000000',
        '000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00','000CCGGGGGGGGGGGGCC0',
        '000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000','000000CCGGGGGGCC0000',
        '000000000L0000000000','00000000SL0000000000','0000000LS00000000000','00000000SSL000000000',
        '000000000SL000000000','00000000LS0000000000','00000000000000000000','00000000000000000000'
      ],
      snow: [
        '00000000000000000000','000000000CC000000000','00000000CCCCC0000000','0000000CCGGGCC000000',
        '000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00','000CCGGGGGGGGGGGGCC0',
        '000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000','000000CCGGGGGGCC0000',
        '000000W00W00W0000000','0000000XWX0000000000','000000W00W00W0000000','0000000WWW0000000000',
        '000000W00W00W0000000','0000000W00000W000000','00000000000000000000','00000000000000000000'
      ],
      night: [
        '00000000000000000000','0000000000MN00000000','000000000MNNN0000000','00000000MNNNN0000000',
        '0000000MNNNNN0000000','0000000MNNNNP0000000','0000000MNNNP00000000','0000000MNN0000000000',
        '000000000CC000000000','00000000CCCCC0000000','0000000CCGGGCC000000','000000CCGGGGGGCC0000',
        '00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00','000CCGGGGGGGGGGGGCC0','000CCGGGGGGGGGGGGCC0',
        '0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000','00000000CCCCC0000000','00000000000000000000'
      ],
      suncloud: [
        '00000000OOOO00000000','000000OYYYYYO0000000','000000OYYYYYYO000000','000000OYYYYYO0000000',
        '00000000OOOO00000000','000000000CC000000000','00000000CCCCC0000000','0000000CCGGGCC000000',
        '000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00','000CCGGGGGGGGGGGGCC0',
        '000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000','00000000CCCCC0000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ]
    };

    // 云朵变体 - 用于动态切换
    const cloudVariants = [
      [
        '00000000000000000000','00000000000000000000','000000000CC000000000','00000000CCCCC0000000',
        '0000000CCGGGCC000000','000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00',
        '000CCGGGGGGGGGGGGCC0','000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000',
        '000000CCGGGGGGCC0000','0000000CCGGGCC000000','00000000CCCCC0000000','000000000CCC00000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ],
      [
        '00000000000000000000','00000000000000000000','00000000CCC000000000','0000000CCGGGC0000000',
        '000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00','000CCGGGGGGGGGGGGCC0',
        '000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000','000000CCGGGGGGCC0000',
        '0000000CCGGGCC000000','00000000CCCCC0000000','000000000CCC00000000','00000000000000000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ],
      [
        '00000000000000000000','00000000000000000000','000000000CC000000000','0000000CCGGGC0000000',
        '000000CCGGGGGGCC0000','00000CCGGGGGGGGCC000','0000CCGGGGGGGGGGCC00','000CCGGGGGGGGGGGGCC0',
        '000CCGGGGGGGGGGGGCC0','0000CCGGGGGGGGGGCC00','00000CCGGGGGGGGCC000','000000CCGGGGGGCC0000',
        '0000000CCGGGC0000000','00000000CCCCC0000000','000000000CCC00000000','00000000000000000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ]
    ];

    const weather = [
      { day: '周一', icon: 'suncloud', temp: '13°C / 22°C', desc: '晴间多云' },
      { day: '周二', icon: 'cloudy', temp: '11°C / 19°C', desc: '多云' },
      { day: '周三', icon: 'rain', temp: '10°C / 17°C', desc: '小雨' },
      { day: '周四', icon: 'storm', temp: '9°C / 16°C', desc: '雷阵雨' },
      { day: '周五', icon: 'sunny', temp: '12°C / 21°C', desc: '晴' },
      { day: '周六', icon: 'snow', temp: '3°C / 8°C', desc: '雨夹雪' },
      { day: '周日', icon: 'night', temp: '8°C / 15°C', desc: '夜间多云' }
    ];

    function mapColor(ch) {
      if (C[ch]) return C[ch];
      return 'transparent';
    }

    function drawPixelIcon(type, variantIndex = 0) {
      const lines = type === 'cloudy' ? cloudVariants[variantIndex] : icons[type];
      const shell = document.createElement('div');
      shell.className = 'pixel-shell';
      const pixel = document.createElement('div');
      pixel.className = 'pixel';
      
      for (let y = 0; y < 20; y++) {
        for (let x = 0; x < 20; x++) {
          const px = document.createElement('span');
          px.className = 'px';
          px.style.background = mapColor(lines[y][x]);
          if (lines[y][x] === 'Y' || lines[y][x] === 'W' || lines[y][x] === 'L') {
            px.style.boxShadow = `0 0 1px ${mapColor(lines[y][x])}`;
          }
          pixel.appendChild(px);
        }
      }
      shell.appendChild(pixel);

      if (type === 'rain') {
        const rainLayer = document.createElement('div');
        rainLayer.className = 'rain-layer';
        const drops = [
          { x: 8, delay: '.00s', dur: '.56s' },
          { x: 15, delay: '.05s', dur: '.50s' },
          { x: 20, delay: '.11s', dur: '.52s' },
          { x: 28, delay: '.17s', dur: '.58s' },
          { x: 31, delay: '.23s', dur: '.60s' },
          { x: 40, delay: '.08s', dur: '.47s' },
          { x: 42, delay: '.05s', dur: '.49s' },
          { x: 50, delay: '.25s', dur: '.55s' },
          { x: 55, delay: '.18s', dur: '.58s' },
          { x: 62, delay: '.12s', dur: '.61s' },
          { x: 67, delay: '.08s', dur: '.54s' },
          { x: 75, delay: '.28s', dur: '.59s' },
          { x: 79, delay: '.20s', dur: '.62s' },
          { x: 85, delay: '.10s', dur: '.53s' },
          { x: 89, delay: '.15s', dur: '.50s' }
        ];
        
        drops.forEach(d => {
          const drop = document.createElement('span');
          drop.className = 'rain-drop';
          drop.style.setProperty('--x', d.x);
          drop.style.setProperty('--delay', d.delay);
          drop.style.setProperty('--dur', d.dur);
          rainLayer.appendChild(drop);
        });
        shell.appendChild(rainLayer);
      }

      return shell;
    }

    const board = document.getElementById('board');

    weather.forEach((item, index) => {
      const card = document.createElement('article');
      card.className = 'day-card';

      const weekday = document.createElement('div');
      weekday.className = 'weekday';
      weekday.textContent = item.day;

      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      if (item.icon === 'rain') wrap.classList.add('rain-icon');
      if (item.icon === 'storm') wrap.classList.add('storm-icon');
      if (item.icon === 'snow') wrap.classList.add('snow-icon');
      if (item.icon === 'cloudy') wrap.classList.add('cloud-icon');
      
      // 云朵初始随机变体
      const cloudVariant = item.icon === 'cloudy' ? Math.floor(Math.random() * 3) : 0;
      const pixelIcon = drawPixelIcon(item.icon, cloudVariant);
      wrap.appendChild(pixelIcon);

      // 鼠标压动效果核心逻辑
      wrap.addEventListener('mousemove', (e) => {
        const rect = wrap.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        // 计算偏移角度（压动效果）
        const rotateX = ((y - centerY) / centerY) * -8; // 上下压动
        const rotateY = ((x - centerX) / centerX) * 8;  // 左右压动
        const scale = 0.95 + Math.abs((x - centerX) / centerX) * 0.05; // 缩放压动
        
        // 应用变换到像素画
        const pixel = wrap.querySelector('.pixel');
        pixel.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(${scale})`;
        pixel.style.filter = `drop-shadow(0 4px 8px #58c6ff80)`;
      });

      // 鼠标离开恢复原状
      wrap.addEventListener('mouseleave', () => {
        const pixel = wrap.querySelector('.pixel');
        pixel.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
        pixel.style.filter = 'none';
      });

      const temp = document.createElement('div');
      temp.className = 'temp';
      temp.textContent = item.temp;

      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = item.desc;

      card.append(weekday, wrap, temp, desc);
      board.appendChild(card);
    });

    // 云朵动态切换变体
    setInterval(() => {
      document.querySelectorAll('.cloud-icon').forEach(wrap => {
        const currentPixel = wrap.querySelector('.pixel');
        currentPixel.remove();
        
        // 随机切换云朵变体
        const randomVariant = Math.floor(Math.random() * 3);
        const newPixelShell = drawPixelIcon('cloudy', randomVariant);
        const newPixel = newPixelShell.querySelector('.pixel');
        wrap.querySelector('.pixel-shell').appendChild(newPixel);
      });
    }, 3000); // 每3秒切换一次云朵形态
  </script>
</body>
</html>
