<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>俊超的网页</title>
    <style>
      body {
        background: #f5f7fb;
        font-family: "Microsoft YaHei", sans-serif;
        margin: 0;
        padding: 40px;
      }

      .card {
        background: white;
        max-width: 520px;
        margin: 0 auto;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }

      h1 {
        color: #1f3a8a;
        margin-top: 0;
      }

      p {
        color: #333;
        line-height: 1.8;
      }

      a {
        color: #2563eb;
        text-decoration: none;
      }

      a:hover {
        color: #1d4ed8;
        text-decoration: underline;
      }

      img {
        width: 100%;
        border-radius: 10px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>你好，管俊超</h1>
      <p>我的网页成功了，而且现在更好看了！</p>
      <a href="https://www.baidu.com" target="_blank">点我打开百度</a>
      <p>这是一张图片：</p>
      <img src="https://picsum.photos/520/300" alt="随机图片">
    </div>
  </body>
</html>
