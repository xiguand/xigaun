<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>近七天天气像素画</title>
  <style>
    :root {
      --bg-a: #070b19;
      --bg-b: #121a31;
      --card: #111a2d;
      --card-line: #2d3d66;
      --text: #e7efff;
      --muted: #9bb0d9;
      --sun-core: #ffd857;
      --sun-ring: #ff9f43;
      --sun-glow: #ffba08;
      --cloud-hi: #d7e3ff;
      --cloud-mid: #9db3db;
      --cloud-low: #7086b1;
      --rain-a: #7ed0ff;
      --rain-b: #4190ff;
      --rain-glow: #a8d8ff;
      --storm: #caa7ff;
      --storm-glow: #e0c3ff;
      --snow: #bff5ff;
      --snow-glow: #e6fdff;
      --moon-a: #a4b7ff;
      --moon-b: #6f86f6;
      --moon-glow: #c0cfff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 450px at 8% -10%, #2f4f9f33 0%, transparent 55%),
        radial-gradient(800px 400px at 92% 110%, #0ea5e922 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-b), var(--bg-a));
      padding: 30px 18px 120px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(24px, 3.8vw, 38px);
      letter-spacing: 1px;
    }

    .sub {
      margin: 10px 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .board {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 16px;
    }

    .day-card {
      background: linear-gradient(180deg, #18233d, var(--card));
      border: 1px solid var(--card-line);
      border-radius: 18px;
      padding: 20px 12px 18px;
      text-align: center;
      box-shadow: 0 8px 20px #0000004f;
      transition: none;
    }

    .day-card:hover {
      box-shadow: 0 14px 26px #00000066;
      transform: none;
    }

    .weekday {
      font-size: 16px;
      font-weight: 700;
      color: #f0f6ff;
      margin-bottom: 12px;
    }

    .icon-wrap {
      height: 160px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      cursor: pointer;
      transition: none;
      perspective: 1000px;
    }

    .pixel {
      --size: 6px;
      display: grid;
      grid-template-columns: repeat(20, var(--size));
      grid-template-rows: repeat(20, var(--size));
      width: calc(20 * var(--size));
      height: calc(20 * var(--size));
      image-rendering: pixelated;
      transform-origin: 50% 50%;
      transition: transform 0.15s ease-out, filter 0.2s ease;
      transform-style: preserve-3d;
    }

    .px {
      width: var(--size);
      height: var(--size);
      transition: background-color 0.2s ease;
    }

    .pixel-shell {
      position: relative;
      width: calc(20 * var(--size));
      height: calc(20 * var(--size));
      transition: none;
    }

    .rain-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .rain-drop {
      position: absolute;
      top: -10%;
      left: calc(var(--x) * 1%);
      width: calc(var(--size) * 0.6);
      height: calc(var(--size) * 2.2);
      background: linear-gradient(180deg, var(--rain-glow), var(--rain-a));
      border-radius: 1px;
      opacity: 0.9;
      image-rendering: pixelated;
      transform: rotate(25deg);
      animation: rain-fall var(--dur, .45s) linear infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes rain-fall {
      0% { transform: translate(-6px, -10px) rotate(25deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translate(22px, 130px) rotate(25deg); opacity: 0; }
    }

    @keyframes storm-flash {
      0% { opacity: 0.7; background-color: var(--storm); }
      100% { opacity: 1; background-color: var(--storm-glow); }
    }

    @keyframes snow-float {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-2px); }
    }

    .temp {
      font-size: 14px;
      color: #b7c7e5;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 14px;
      font-weight: 700;
      color: #dfe8ff;
    }

    .signature {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #7dd3fc, #60a5fa, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 8px 28px #4cc9ff55;
      user-select: none;
      pointer-events: none;
      line-height: 1;
    }
  </style>
</head>
<body>
  <h1>近七天天气像素画</h1>
  <div class="sub">鼠标滑动图标可见压动效果</div>

  <section class="board" id="board"></section>
  <div class="signature">管俊超</div>

  <script>
    const C = {
      H: '#f4f8ff',
      C: 'var(--cloud-hi)',
      G: 'var(--cloud-mid)',
      D: 'var(--cloud-low)',
      Y: 'var(--sun-core)',
      O: 'var(--sun-ring)',
      Z: 'var(--sun-glow)',
      R: 'var(--rain-a)',
      B: 'var(--rain-b)',
      L: 'var(--storm)',
      S: 'var(--storm-glow)',
      W: 'var(--snow)',
      X: 'var(--snow-glow)',
      M: 'var(--moon-a)',
      N: 'var(--moon-b)',
      P: 'var(--moon-glow)'
    };

    const icons = {
      // 圆形太阳（彻底修复不扁）
      sunny: [
        "00000000000000000000",
        "00000000ZZZ000000000",
        "000000ZZZZZZZ0000000",
        "00000OYYYYYYYO000000",
        "0000OYYYYYYYYYO00000",
        "000OYYYYYYYYYYYO0000",
        "00OYYYYYYYYYYYYYO000",
        "00OYYYYYYYYYYYYYO000",
        "00OYYYYYYYYYYYYYO000",
        "00OYYYYYYYYYYYYYO000",
        "00OYYYYYYYYYYYYYO000",
        "000OYYYYYYYYYYYO0000",
        "0000OYYYYYYYYYO00000",
        "00000OYYYYYYYO000000",
        "000000ZZZZZZZ0000000",
        "00000000ZZZ000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000"
      ],

      // 晴转多云（太阳也是正圆）
      suncloud: [
        "00000000000000000000",
        "00000000ZZZ000000000",
        "000000ZZZZZZZ0000000",
        "00000OYYYYYYYO000000",
        "0000OYYYYYYYYYO00000",
        "000OYYYYYYYYYYYO0000",
        "00OYYYYYYYYYYYYYO000",
        "00OYYYYYYYYYYYYYO000",
        "000000000CCCCC000000",
        "0000000CCGGGGGCC0000",
        "00000CCGGGGGGGGCC000",
        "0000CCGGGGGGGGGGCC00",
        "000CCGGGGGGGGGGGGCC0",
        "000CCGGGGGGGGGGGGCC0",
        "0000CCGGGGGGGGGGCC00",
        "000000CCGGGGGCC00000",
        "00000000CCCCC0000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000"
      ],

      cloudy: [
        "00000000000000000000",
        "00000000000000000000",
        "000000000CCC00000000",
        "0000000CCGGGC0000000",
        "000000CCGGGGGGCC0000",
        "00000CCGGGGGGGGCC000",
        "0000CCGGGGGGGGGGCC00",
        "000CCGGGGGGGGGGGGCC0",
        "000CCGGGGGGGGGGGGCC0",
        "0000CCGGGGGGGGGGCC00",
        "00000CCGGGGGGGGCC000",
        "000000CCGGGGGCC00000",
        "0000000CCGGGC0000000",
        "00000000CCCCC0000000",
        "000000000CCC00000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000"
      ],

      rain: [
        "00000000000000000000",
        "000000000CCC00000000",
        "0000000CCGGGC0000000",
        "000000CCGGGGGGCC0000",
        "00000CCGGGGGGGGCC000",
        "0000CCGGGGGGGGGGCC00",
        "000CCGGGGGGGGGGGGCC0",
        "000CCGGGGGGGGGGGGCC0",
        "0000CCGGGGGGGGGGCC00",
        "00000CCGGGGGGGGCC000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000"
      ],

      storm: [
        "00000000000000000000",
        "000000000CCC00000000",
        "0000000CCGGGC0000000",
        "000000CCGGGGGGCC0000",
        "00000CCGGGGGGGGCC000",
        "0000CCGGGGGGGGGGCC00",
        "000CCGGGGGGGGGGGGCC0",
        "000CCGGGGGGGGGGGGCC0",
        "0000CCGGGGGGGGGGCC00",
        "00000CCGGGGGGGGCC000",
        "000000000L0000000000",
        "00000000LL0000000000",
        "0000000LL00000000000",
        "00000000LLL000000000",
        "000000000LL000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000"
      ],

      snow: [
        "00000000000000000000",
        "000000000CCC00000000",
        "0000000CCGGGC0000000",
        "000000CCGGGGGGCC0000",
        "00000CCGGGGGGGGCC000",
        "0000CCGGGGGGGGGGCC00",
        "000CCGGGGGGGGGGGGCC0",
        "000CCGGGGGGGGGGGGCC0",
        "0000CCGGGGGGGGGGCC00",
        "00000CCGGGGGGGGCC000",
        "000000W0W0W0W0000000",
        "0000000WWW0WWW000000",
        "000000W0W0W0W0000000",
        "0000000WWW0WWW000000",
        "000000W0W0W0W0000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000"
      ],

      // 重新画的月亮（好看、圆润）
      night: [
        "00000000000000000000",
        "000000000MMMM0000000",
        "0000000MMMMMMM000000",
        "000000MMMMMMMMM00000",
        "00000MMMMMMMMMMM0000",
        "0000MMMMMMMMMMMMM000",
        "000MMMMMMMMMMMMMM000",
        "000MMMMMMMMMMMMMM000",
        "000MMMMMMMMMMMMMM000",
        "0000MMMMMMMMMMMMM000",
        "000000000CCC00000000",
        "0000000CCGGGC0000000",
        "000000CCGGGGGGCC0000",
        "00000CCGGGGGGGGCC000",
        "0000CCGGGGGGGGGGCC00",
        "000CCGGGGGGGGGGGGCC0",
        "000CCGGGGGGGGGGGGCC0",
        "00000000000000000000",
        "00000000000000000000",
        "00000000000000000000"
      ]
    };

    const weather = [
      { day: "周一", icon: "suncloud", temp: "13°C / 22°C", desc: "晴间多云" },
      { day: "周二", icon: "cloudy", temp: "11°C / 19°C", desc: "多云" },
      { day: "周三", icon: "rain", temp: "10°C / 17°C", desc: "小雨" },
      { day: "周四", icon: "storm", temp: "9°C / 16°C", desc: "雷阵雨" },
      { day: "周五", icon: "sunny", temp: "12°C / 21°C", desc: "晴" },
      { day: "周六", icon: "snow", temp: "3°C / 8°C", desc: "雨夹雪" },
      { day: "周日", icon: "night", temp: "8°C / 15°C", desc: "夜间多云" }
    ];

    function mapColor(ch) {
      return C[ch] || 'transparent';
    }

    function drawPixelIcon(type) {
      const lines = icons[type];
      const shell = document.createElement('div');
      shell.className = 'pixel-shell';
      const pixel = document.createElement('div');
      pixel.className = 'pixel';

      for (let y = 0; y < 20; y++) {
        for (let x = 0; x < 20; x++) {
          const px = document.createElement('span');
          px.className = 'px';
          px.style.background = mapColor(lines[y][x]);
          pixel.appendChild(px);
        }
      }
      shell.appendChild(pixel);

      if (type === 'rain') {
        const rainLayer = document.createElement('div');
        rainLayer.className = 'rain-layer';
        const drops = [
          { x: 20, delay: '0s', dur: '0.45s' },
          { x: 28, delay: '0.07s', dur: '0.42s' },
          { x: 36, delay: '0.14s', dur: '0.48s' },
          { x: 44, delay: '0.03s', dur: '0.44s' },
          { x: 52, delay: '0.1s', dur: '0.46s' },
          { x: 60, delay: '0.18s', dur: '0.43s' },
          { x: 68, delay: '0.05s', dur: '0.5s' },
          { x: 76, delay: '0.12s', dur: '0.47s' }
        ];
        drops.forEach(d => {
          const drop = document.createElement('span');
          drop.className = 'rain-drop';
          drop.style.setProperty('--x', d.x);
          drop.style.setProperty('--delay', d.delay);
          drop.style.setProperty('--dur', d.dur);
          rainLayer.appendChild(drop);
        });
        shell.appendChild(rainLayer);
      }
      return shell;
    }

    const board = document.getElementById('board');

    weather.forEach(item => {
      const card = document.createElement('article');
      card.className = 'day-card';

      const weekday = document.createElement('div');
      weekday.className = 'weekday';
      weekday.textContent = item.day;

      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      wrap.appendChild(drawPixelIcon(item.icon));

      const temp = document.createElement('div');
      temp.className = 'temp';
      temp.textContent = item.temp;

      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = item.desc;

      card.append(weekday, wrap, temp, desc);
      board.appendChild(card);
    });
  </script>
</body>
</html>
