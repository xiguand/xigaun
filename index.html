<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>近七天天气像素画</title>
  <style>
    :root {
      --bg-a: #070b19;
      --bg-b: #121a31;
      --card: #111a2d;
      --card-line: #2d3d66;
      --text: #e7efff;
      --muted: #9bb0d9;
      --sun-core: #ffd857;
      --sun-ring: #ff9f43;
      --cloud-hi: #d7e3ff;
      --cloud-mid: #9db3db;
      --cloud-low: #7086b1;
      --rain-a: #7ed0ff;
      --rain-b: #4190ff;
      --storm: #caa7ff;
      --snow: #bff5ff;
      --moon-a: #a4b7ff;
      --moon-b: #6f86f6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 450px at 8% -10%, #2f4f9f33 0%, transparent 55%),
        radial-gradient(800px 400px at 92% 110%, #0ea5e922 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-b), var(--bg-a));
      padding: 30px 18px 120px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(24px, 3.8vw, 38px);
      letter-spacing: 1px;
    }

    .sub {
      margin: 10px 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .board {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
    }

    .day-card {
      background: linear-gradient(180deg, #18233d, var(--card));
      border: 1px solid var(--card-line);
      border-radius: 14px;
      padding: 12px 8px 10px;
      text-align: center;
      box-shadow: 0 8px 20px #0000004f;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .day-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 26px #00000066;
    }

    .weekday {
      font-size: 14px;
      font-weight: 700;
      color: #f0f6ff;
      margin-bottom: 8px;
    }

    .icon-wrap {
      height: 130px;
      display: grid;
      place-items: center;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .pixel {
      --size: 5px;
      display: grid;
      grid-template-columns: repeat(20, var(--size));
      grid-template-rows: repeat(20, var(--size));
      width: calc(20 * var(--size));
      height: calc(20 * var(--size));
      image-rendering: pixelated;
      transform-origin: 50% 60%;
      transition: filter .2s ease;
    }

    .px { width: var(--size); height: var(--size); }

    .pixel-shell {
      position: relative;
      width: calc(20 * var(--size));
      height: calc(20 * var(--size));
    }

    .icon-wrap:hover .pixel {
      animation: floaty .7s steps(2, end) infinite alternate;
      filter: drop-shadow(0 0 8px #58c6ff80);
    }

    .rain-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .rain-drop {
      position: absolute;
      top: -8%;
      left: calc(var(--x) * 1%);
      width: calc(var(--size) * 1);
      height: calc(var(--size) * 3);
      background: linear-gradient(180deg, #c7ecff, #5da7ff);
      opacity: 0;
      image-rendering: pixelated;
    }

    .rain-icon:hover .rain-drop {
      opacity: 1;
      animation: terraria-rain var(--dur, .55s) steps(3, end) infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes floaty {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-5px) scale(1.04); }
    }

    @keyframes terraria-rain {
      0% { transform: translateY(-10px); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(110px); opacity: .2; }
    }

    .temp {
      font-size: 13px;
      color: #b7c7e5;
      margin-bottom: 4px;
    }

    .desc {
      font-size: 13px;
      font-weight: 700;
      color: #dfe8ff;
    }

    .signature {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #7dd3fc, #60a5fa, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 8px 28px #4cc9ff55;
      user-select: none;
      pointer-events: none;
      line-height: 1;
    }
  </style>
</head>
<body>
  <h1>近七天天气像素画</h1>
  <div class="sub">悬浮天气图标可见像素动态效果</div>

  <section class="board" id="board"></section>

  <div class="signature">管俊超</div>

  <script>
    const C = {
      H: '#f4f8ff',
      C: '#d7e3ff',
      G: '#9db3db',
      D: '#7086b1',
      Y: '#ffd857',
      O: '#ff9f43',
      R: '#7ed0ff',
      B: '#4190ff',
      L: '#caa7ff',
      W: '#bff5ff',
      M: '#a4b7ff',
      N: '#6f86f6'
    };

    const icons = {
      sunny: [
        '00000000000000000000','00000000000000000000','000000000OOOO00000000','0000000OYYYYO0000000',
        '000000OYYYYYYO000000','00000OYYYYYYYYO00000','00000YYYYYYYYYY000000','0000OYYYYYYYYYYO0000',
        '0000OYYYYYYYYYYO0000','00000YYYYYYYYYY000000','00000OYYYYYYYYO00000','000000OYYYYYYO000000',
        '0000000OYYYYO0000000','000000000OOOO00000000','00000000000000000000','00000000000000000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ],
      cloudy: [
        '00000000000000000000','00000000000000000000','00000000CCC000000000','0000000CCCCC00000000',
        '000000CCCGCCC0000000','00000CCGGGGCCC000000','0000CCGGGGGGGCCC0000','000CCGGGGGGGGGGCC000',
        '000CCGGGGGGGGGGCC000','0000CCGGGGGGGCCC0000','00000CCGGGGCCC000000','000000CCCGCCC0000000',
        '0000000CCCCC00000000','00000000CCC000000000','00000000000000000000','00000000000000000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ],
      rain: [
        '00000000000000000000','00000000CCC000000000','0000000CCCCC00000000','000000CCCGCCC0000000',
        '00000CCGGGGCCC000000','0000CCGGGGGGGCCC0000','000CCGGGGGGGGGGCC000','000CCGGGGGGGGGGCC000',
        '0000CCGGGGGGGCCC0000','00000CCGGGGCCC000000','000000CCCGCCC0000000','00000000CCC000000000',
        '000000R00B00R0000000','0000000R0B0R00000000','000000R00B00R0000000','0000000R0B0R00000000',
        '000000R00B00R0000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ],
      storm: [
        '00000000000000000000','00000000CCC000000000','0000000CCCCC00000000','000000CCCGCCC0000000',
        '00000CCGGGGCCC000000','0000CCGGGGGGGCCC0000','000CCGGGGGGGGGGCC000','000CCGGGGGGGGGGCC000',
        '0000CCGGGGGGGCCC0000','00000CCGGGGCCC000000','000000CCCGCCC0000000','00000000CCC000000000',
        '000000000L0000000000','00000000LL0000000000','0000000LL00000000000','00000000LLL000000000',
        '000000000LL000000000','00000000LL0000000000','00000000000000000000','00000000000000000000'
      ],
      snow: [
        '00000000000000000000','00000000CCC000000000','0000000CCCCC00000000','000000CCCGCCC0000000',
        '00000CCGGGGCCC000000','0000CCGGGGGGGCCC0000','000CCGGGGGGGGGGCC000','000CCGGGGGGGGGGCC000',
        '0000CCGGGGGGGCCC0000','00000CCGGGGCCC000000','000000CCCGCCC0000000','00000000CCC000000000',
        '000000W00W00W0000000','0000000WWW0000000000','000000W00W00W0000000','0000000WWW0000000000',
        '000000W00W00W0000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ],
      night: [
        '00000000000000000000','0000000000MN00000000','000000000MNNN0000000','00000000MNNNN0000000',
        '0000000MNNNNN0000000','0000000MNNNN00000000','0000000MNNN000000000','0000000MNN0000000000',
        '00000000CCC000000000','0000000CCCCC00000000','000000CCCGCCC0000000','00000CCGGGGCCC000000',
        '0000CCGGGGGGGCCC0000','000CCGGGGGGGGGGCC000','000CCGGGGGGGGGGCC000','0000CCGGGGGGGCCC0000',
        '00000CCGGGGCCC000000','000000CCCGCCC0000000','0000000CCCCC00000000','00000000000000000000'
      ],
      suncloud: [
        '00000000OOO000000000','0000000OYYYOO00000000','000000OYYYYYO0000000','0000000OYYYOO00000000',
        '00000000OOO000000000','000000000000CCC00000','00000000000CCCCC0000','000000000CCCGCCC0000',
        '00000000CCGGGGCCC000','0000000CCGGGGGGCC000','00000000CCGGGGCC0000','000000000CCCGCC00000',
        '0000000000CCC0000000','00000000000000000000','00000000000000000000','00000000000000000000',
        '00000000000000000000','00000000000000000000','00000000000000000000','00000000000000000000'
      ]
    };

    const weather = [
      { day: '周一', icon: 'suncloud', temp: '13°C / 22°C', desc: '晴间多云' },
      { day: '周二', icon: 'cloudy', temp: '11°C / 19°C', desc: '多云' },
      { day: '周三', icon: 'rain', temp: '10°C / 17°C', desc: '小雨' },
      { day: '周四', icon: 'storm', temp: '9°C / 16°C', desc: '雷阵雨' },
      { day: '周五', icon: 'sunny', temp: '12°C / 21°C', desc: '晴' },
      { day: '周六', icon: 'snow', temp: '3°C / 8°C', desc: '雨夹雪' },
      { day: '周日', icon: 'night', temp: '8°C / 15°C', desc: '夜间多云' }
    ];

    function mapColor(ch) {
      if (C[ch]) return C[ch];
      return 'transparent';
    }

    function drawPixelIcon(type) {
      const lines = icons[type];
      const shell = document.createElement('div');
      shell.className = 'pixel-shell';
      const pixel = document.createElement('div');
      pixel.className = 'pixel';
      for (let y = 0; y < 20; y++) {
        for (let x = 0; x < 20; x++) {
          const px = document.createElement('span');
          px.className = 'px';
          px.style.background = mapColor(lines[y][x]);
          pixel.appendChild(px);
        }
      }
      shell.appendChild(pixel);

      if (type === 'rain') {
        const rainLayer = document.createElement('div');
        rainLayer.className = 'rain-layer';
        const drops = [
          { x: 8, delay: '.00s', dur: '.56s' },
          { x: 20, delay: '.11s', dur: '.52s' },
          { x: 31, delay: '.23s', dur: '.60s' },
          { x: 42, delay: '.05s', dur: '.49s' },
          { x: 55, delay: '.18s', dur: '.58s' },
          { x: 67, delay: '.08s', dur: '.54s' },
          { x: 79, delay: '.20s', dur: '.62s' },
          { x: 89, delay: '.15s', dur: '.50s' }
        ];
        drops.forEach(d => {
          const drop = document.createElement('span');
          drop.className = 'rain-drop';
          drop.style.setProperty('--x', d.x);
          drop.style.setProperty('--delay', d.delay);
          drop.style.setProperty('--dur', d.dur);
          rainLayer.appendChild(drop);
        });
        shell.appendChild(rainLayer);
      }

      return shell;
    }

    const board = document.getElementById('board');

    weather.forEach(item => {
      const card = document.createElement('article');
      card.className = 'day-card';

      const weekday = document.createElement('div');
      weekday.className = 'weekday';
      weekday.textContent = item.day;

      const wrap = document.createElement('div');
      wrap.className = 'icon-wrap';
      if (item.icon === 'rain') wrap.classList.add('rain-icon');
      wrap.appendChild(drawPixelIcon(item.icon));

      const temp = document.createElement('div');
      temp.className = 'temp';
      temp.textContent = item.temp;

      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = item.desc;

      card.append(weekday, wrap, temp, desc);
      board.appendChild(card);
    });
  </script>
</body>
</html>
